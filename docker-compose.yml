version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mascotas-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mascotasdb
      MYSQL_USER: mascotasuser
      MYSQL_PASSWORD: mascotaspassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql-data:
